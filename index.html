<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Happy International Women's Day</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style/style.css" />
</head>

<body>
  <!-- ===== CUSTOM BACKGROUND MEDIA ===== -->
  <!-- Đặt file bg.mp4 / bg.gif / bg.jpg vào folder style/background/ -->
  <div id="bg-media-wrap" style="position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;"></div>

  <div class="lock-screen" id="lock-screen">
    <div class="lock-content">
      <div class="lock-image">
        <img src="style/img/Anh Pass.jpg" alt="Pass Image">
      </div>
      <div class="lock-form">
        <div class="lock-icon">
          <i class="fa-solid fa-heart"></i>
        </div>
        <div class="pass-dots" id="pass-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="numpad">
          <button class="num-btn" data-value="1">1</button>
          <button class="num-btn" data-value="2">2</button>
          <button class="num-btn" data-value="3">3</button>
          <button class="num-btn" data-value="4">4</button>
          <button class="num-btn" data-value="5">5</button>
          <button class="num-btn" data-value="6">6</button>
          <button class="num-btn" data-value="7">7</button>
          <button class="num-btn" data-value="8">8</button>
          <button class="num-btn" data-value="9">9</button>
          <button class="num-btn blank"></button>
          <button class="num-btn" data-value="0">0</button>
          <button class="num-btn delete-btn"><i class="fa-solid fa-delete-left"></i></button>
        </div>

        <div class="hint-box" id="hint-box">
          <span class="hint-icon">💡</span>
          <span class="hint-text" id="hint-text">...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="container main-content-hidden" id="main-content">
    <div class="menu">
      <button class="menu-item" id="btn-music">
        <span class="icon"><img src="style/img/asset/music.png" alt="Music" /></span>
        <span>Music</span>
      </button>
      <button class="menu-item" id="btn-letter">
        <span class="icon"><img src="style/img/asset/letter.png" alt="Letter" /></span>
        <span>Letter</span>
      </button>
      <button class="menu-item" id="btn-image">
        <span class="icon"><img src="style/img/asset/image.png" alt="Image" /></span>
        <span>Image</span>
      </button>
      <button class="menu-item" id="btn-gift">
        <span class="icon"><img src="style/img/asset/gift.png" alt="Gift" /></span>
        <span>Gift</span>
      </button>
    </div>

  </div>

  <button class="reset-lock-btn" id="btn-reset-lock">
    <i class="fa-solid fa-lock"></i>
  </button>

  <div class="overlay" id="letter-overlay">
    <div class="letter-modal">
      <button class="close-btn" id="close-letter"><i class="fa-solid fa-xmark"></i></button>
      <div class="letter-content">
        <div class="letter-body" id="letter-body"></div>
      </div>
      <img src="https://i.pinimg.com/originals/4e/89/d3/4e89d3e4ec4b1f59b1664e880a875c65.gif" alt="Decoration"
        class="letter-gif" />
    </div>
  </div>

  <div class="overlay" id="music-overlay">
    <div class="music-modal">
      <button class="close-btn" id="close-music"><i class="fa-solid fa-xmark"></i></button>
      <div class="spotify-player">
        <div class="player-header">
          <img src="style/img/asset/music.png" alt="Spotify" class="spotify-logo" />
          <span>Music Player</span>
        </div>
        <div class="now-playing">
          <div class="song-info">
            <div class="album-art" id="album-art">
              <img src="" alt="Album Art" />
            </div>
            <div class="song-details">
              <h3 id="song-title">Select a song</h3>
              <p id="song-artist">Artist name</p>
            </div>
          </div>

          <div class="player-controls">
            <div class="progress-container">
              <span id="current-time">0:00</span>
              <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
              </div>
              <span id="duration">0:00</span>
            </div>

            <div class="control-buttons">
              <button class="ctrl-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
              <button class="ctrl-btn play-pause" id="play-pause-btn">
                <i class="fa-solid fa-play"></i>
              </button>
              <button class="ctrl-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
          </div>
        </div>

        <div class="song-list" id="song-list"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="image-overlay">
    <div class="image-modal">
      <button class="close-btn" id="close-image"><i class="fa-solid fa-xmark"></i></button>
      <div class="gallery-container">
        <div class="gallery-row row-top" id="gallery-top"></div>
        <div class="gallery-row row-bottom" id="gallery-bottom"></div>
      </div>
      <div class="gallery-gif-wrapper top">
        <img src="https://i.pinimg.com/originals/3f/4e/d3/3f4ed3cb1539cb42dc93b78020a3ef55.gif" alt="Decoration"
          class="gallery-gif" />
        <div class="flying-text text-right">
          HAPPY INTERNATIONAL WOMEN'S DAY
        </div>
      </div>

      <div class="gallery-gif-wrapper bottom">
        <div class="flying-text text-left">
          HAPPY INTERNATIONAL WOMEN'S DAY
        </div>
        <img src="https://i.pinimg.com/originals/0f/f7/ac/0ff7acbadeffd1e41be9811d67e1697e.gif" alt="Decoration"
          class="gallery-gif" />
      </div>
    </div>
  </div>

  <div class="overlay" id="lightbox-overlay" style="z-index: 2000">
    <div class="lightbox-content">
      <button class="close-btn" id="close-lightbox"><i class="fa-solid fa-xmark"></i></button>
      <img src="" alt="Full View" id="lightbox-img" />
    </div>
  </div>

  <div class="overlay" id="gift-overlay">
    <div class="gift-modal" id="gift-modal-element">
      <button class="close-btn" id="close-gift"><i class="fa-solid fa-xmark"></i></button>
      <button class="fullscreen-btn" id="fullscreen-gift"><i class="fa-solid fa-expand"></i></button>
      <iframe src="" frameborder="0" class="gift-iframe"></iframe>
    </div>
  </div>

  <audio id="audio-player"></audio>
  <audio id="pop-sound" src="style/pop.mp3"></audio>
  <audio id="image-sound" src="style/img/image.mp3" loop></audio>

  <script src="style/script.js"></script>

  <script>
    // Fix: tránh nhạc gift và nhạc player bị trồng chéo
    (function () {
      var wasPlaying = false;

      var GIFT_SRC = 'style/gift/gift.html?v=' + new Date().getTime();

      // Khi mở Gift: load iframe, dừng nhạc player ngoài
      document.getElementById('btn-gift').addEventListener('click', function () {
        var iframe = document.querySelector('.gift-iframe');
        if (iframe && !iframe.src.includes('gift.html')) {
          iframe.src = GIFT_SRC;
        }
        var player = document.getElementById('audio-player');
        if (player && !player.paused) {
          wasPlaying = true;
          player.pause();
        }
      });

      function closeGiftCleanup() {
        // Hủy hoàn toàn iframe để dừng mọi âm thanh bên trong
        var iframe = document.querySelector('.gift-iframe');
        if (iframe) {
          iframe.src = '';
        }
        // Resume nhạc player ngoài nếu trước đó đang phát
        if (wasPlaying) {
          var player = document.getElementById('audio-player');
          if (player) player.play().catch(function () { });
          wasPlaying = false;
        }
      }

      // Khi đóng bằng nút X
      document.getElementById('close-gift').addEventListener('click', closeGiftCleanup);

      // Khi nhấn Escape hoặc click ra ngoài overlay (nếu có)
      document.getElementById('gift-overlay').addEventListener('click', function (e) {
        if (e.target === this) closeGiftCleanup();
      });
    })();

    // === Image modal: phát nhạc image.mp3 khi mở, dừng khi đóng ===
    (function () {
      var imageSound = document.getElementById('image-sound');
      var mainPlayer = document.getElementById('audio-player');
      var wasMainPlaying = false;

      function openImageMusic() {
        if (!imageSound) return;
        // Dừng nhạc chính nếu đang phát
        if (mainPlayer && !mainPlayer.paused) {
          wasMainPlaying = true;
          mainPlayer.pause();
        }
        imageSound.currentTime = 0;
        imageSound.play().catch(function () { });
      }

      function closeImageMusic() {
        if (!imageSound) return;
        imageSound.pause();
        imageSound.currentTime = 0;
        // Resume nhạc chính nếu trước đó đang phát
        if (wasMainPlaying) {
          if (mainPlayer) mainPlayer.play().catch(function () { });
          wasMainPlaying = false;
        }
      }

      // Dùng MutationObserver để detect class 'active' trên #image-overlay
      var imageOverlay = document.getElementById('image-overlay');
      if (imageOverlay) {
        new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            if (m.type === 'attributes' && m.attributeName === 'class') {
              if (imageOverlay.classList.contains('active')) {
                openImageMusic();
              } else {
                closeImageMusic();
              }
            }
          });
        }).observe(imageOverlay, { attributes: true });
      }
    })();

    // Load hint từ hint.txt
    fetch('hint.txt')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var el = document.getElementById('hint-text');
        if (el) el.textContent = text.trim();
      })
      .catch(function () { /* giữ nguyên dấu ... nếu load thất bại */ });

    // === Dynamic Music Button: vinyl disc + equalizer khi đang phát ===
    (function () {
      // HTML gốc của button (lưu để restore)
      var btn = document.getElementById('btn-music');
      var ORIGINAL_HTML = btn ? btn.innerHTML : '';

      // Inject keyframes vào <head> để đảm bảo animation hoạt động
      (function ensureVinylStyles() {
        if (!document.getElementById('vinyl-keyframes')) {
          var s = document.createElement('style');
          s.id = 'vinyl-keyframes';
          s.textContent =
            '@keyframes vinylSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}' +
            '@keyframes waveBar{from{transform:scaleY(0.15);opacity:0.55}to{transform:scaleY(1);opacity:1}}';
          document.head.appendChild(s);
        }
      })();

      function buildVinylHTML(song) {
        var bars = '';
        for (var i = 0; i < 18; i++) bars += '<span></span>';
        var discStyle = 'width:76px;height:76px;border-radius:50%;position:relative;flex-shrink:0;animation:vinylSpin 5s linear infinite;box-shadow:0 0 0 3px rgba(255,255,255,0.5),0 0 0 7px rgba(216,27,96,0.2),0 8px 22px rgba(0,0,0,0.2);';
        var imgStyle = 'width:76px;height:76px;object-fit:cover;display:block;border-radius:50%;';
        var grooveStyle = 'position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,0.65) 0%,rgba(0,0,0,0.4) 18%,transparent 27%,transparent 73%,rgba(0,0,0,0.25) 85%,rgba(0,0,0,0.5) 100%);pointer-events:none;';
        var holeStyle = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,#999 0%,#222 100%);border:1.5px solid rgba(255,255,255,0.4);z-index:2;pointer-events:none;';
        var wrapStyle = 'display:flex;flex-direction:column;align-items:center;gap:12px;';
        return (
          '<div class="vinyl-wrap" style="' + wrapStyle + '">' +
          '<div class="vinyl-disc" style="' + discStyle + '">' +
          '<img class="vinyl-img" src="' + song.cover + '" style="' + imgStyle + '" alt="" />' +
          '<div style="' + grooveStyle + '"></div>' +
          '<div style="' + holeStyle + '"></div>' +
          '</div>' +
          '<div class="vinyl-wave">' + bars + '</div>' +
          '</div>' +
          '<span class="song-label">' + song.title + '</span>'
        );
      }

      // ===== WEB AUDIO API VISUALIZER =====
      var _audioCtx = null, _analyser = null, _rafId = null, _connected = false;

      function _initAnalyser() {
        var player = document.getElementById('audio-player');
        if (!player || _connected) return;
        try {
          _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          _analyser = _audioCtx.createAnalyser();
          _analyser.fftSize = 256;                 // 128 frequency bins
          _analyser.smoothingTimeConstant = 0.78;  // làm mượt giữa các frame
          var src = _audioCtx.createMediaElementSource(player);
          src.connect(_analyser);
          _analyser.connect(_audioCtx.destination);
          _connected = true;
        } catch (e) { /* browser không hỗ trợ — fallback CSS */ }
      }

      function _startViz() {
        if (_rafId) return;           // đang chạy rồi, skip
        _initAnalyser();
        if (!_analyser) return;       // fallback: CSS animation tự chạy
        if (_audioCtx.state === 'suspended') _audioCtx.resume();

        var freqData = new Uint8Array(_analyser.frequencyBinCount); // 128 bins
        var HALF = 9; // 18 bars / 2
        var step = Math.floor(freqData.length / HALF);

        function tick() {
          _rafId = requestAnimationFrame(tick);
          _analyser.getByteFrequencyData(freqData);

          var b = document.getElementById('btn-music');
          if (!b) return;
          var bars = b.querySelectorAll('.vinyl-wave span');
          if (!bars.length) return;

          // Thu thập HALF giá trị (low→high freq)
          var vals = [];
          for (var i = 0; i < HALF; i++) {
            var sum = 0;
            for (var j = 0; j < step; j++) sum += freqData[i * step + j];
            var avg = sum / step;
            var normalized = avg / 255;
            vals.push(Math.max(2, Math.round(Math.sqrt(normalized) * 22)));
          }

          // Mirror: [val[HALF-1]..val[0], val[0]..val[HALF-1]]
          // → bass (vals[0]) ở giữa, treble (vals[HALF-1]) ở rìa
          var mirrored = [];
          for (var k = HALF - 1; k >= 0; k--) mirrored.push(vals[k]); // rìa trái → giữa
          for (var k = 0; k < HALF; k++) mirrored.push(vals[k]);       // giữa → rìa phải

          for (var i = 0; i < bars.length; i++) {
            var h = mirrored[i] || 2;
            bars[i].style.cssText = 'height:' + h + 'px !important;animation:none;transition:height 0.06s;';
          }
        }
        tick();
      }

      function _stopViz() {
        if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
        // Trả bars về CSS animation
        var b = document.getElementById('btn-music');
        if (!b) return;
        var bars = b.querySelectorAll('.vinyl-wave span');
        bars.forEach(function (bar) { bar.style.cssText = ''; });
      }
      // ===== END VISUALIZER =====

      function updateMusicButton() {
        var player = document.getElementById('audio-player');
        btn = document.getElementById('btn-music');
        if (!player || !btn) return;

        var playing = !player.paused;
        var song = (typeof songs !== 'undefined' && typeof songIndex !== 'undefined')
          ? songs[songIndex] : null;

        if (playing && song) {
          if (!btn.querySelector('.vinyl-disc')) {
            btn.innerHTML = buildVinylHTML(song);
          } else {
            var img = btn.querySelector('.vinyl-img');
            var lbl = btn.querySelector('.song-label');
            if (img) img.src = song.cover;
            if (lbl) lbl.textContent = song.title;
          }
          var d = btn.querySelector('.vinyl-disc');
          var w = btn.querySelector('.vinyl-wave');
          if (d) d.classList.remove('paused');
          if (w) w.classList.remove('paused');
          _startViz();

        } else if (!playing && song && btn.querySelector('.vinyl-disc')) {
          var d2 = btn.querySelector('.vinyl-disc');
          var w2 = btn.querySelector('.vinyl-wave');
          if (d2) d2.classList.add('paused');
          if (w2) w2.classList.add('paused');
          var lbl2 = btn.querySelector('.song-label');
          if (lbl2) lbl2.textContent = song.title;
          _stopViz();

        } else {
          _stopViz();
          btn.innerHTML = ORIGINAL_HTML;
        }
      }

      var player = document.getElementById('audio-player');
      if (player) {
        player.addEventListener('play', updateMusicButton);
        player.addEventListener('pause', updateMusicButton);
        player.addEventListener('ended', updateMusicButton);
      }

      // Khi next/prev song: MutationObserver trên #song-title
      var songTitleEl = document.getElementById('song-title');
      if (songTitleEl) {
        new MutationObserver(function () {
          setTimeout(updateMusicButton, 50);
        }).observe(songTitleEl, { childList: true, subtree: true, characterData: true });
      }
    })();

    // ===== AUTO BACKGROUND: style/background/bg.* =====
    (function () {
      var BASE = 'style/background/';
      // Thứ tự ưu tiên: mp4 > webm > gif > png > jpg > jpeg > webp
      var candidates = [
        { src: BASE + 'bg.mp4', type: 'video' },
        { src: BASE + 'bg.webm', type: 'video' },
        { src: BASE + 'bg.gif', type: 'image' },
        { src: BASE + 'bg.png', type: 'image' },
        { src: BASE + 'bg.jpg', type: 'image' },
        { src: BASE + 'bg.jpeg', type: 'image' },
        { src: BASE + 'bg.webp', type: 'image' }
      ];

      var wrap = document.getElementById('bg-media-wrap');

      function applyMedia(item) {
        if (item.type === 'video') {
          var v = document.createElement('video');
          v.src = item.src;
          v.muted = true;
          v.loop = true;
          v.autoplay = true;
          v.playsInline = true;
          v.setAttribute('playsinline', '');
          v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;';
          v.addEventListener('canplay', function () {
            wrap.appendChild(v);
            v.play().catch(function () { });
            document.body.classList.add('has-bg-media');
            document.body.classList.add('has-bg-animated'); // Remove checkerboard
          }, { once: true });

          // Tránh nháy đen: bỏ qua 1s đầu và 1s cuối của video
          v.addEventListener('timeupdate', function () {
            if (v.duration && v.currentTime >= v.duration - 1) {
              v.currentTime = 1;
              v.play().catch(function () { });
            }
          });

          v.load();
        } else {
          var img = new Image();
          img.onload = function () {
            img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;';
            wrap.appendChild(img);
            document.body.classList.add('has-bg-media');
            // Nếu là gif (ảnh động), bỏ viền kẻ caro
            if (item.src.toLowerCase().includes('.gif')) {
              document.body.classList.add('has-bg-animated');
            }
          };
          img.src = item.src;
        }
      }

      // Thử lần lượt từng candidate bằng fetch HEAD
      function tryNext(idx) {
        if (idx >= candidates.length) return; // không có file nào → giữ gradient CSS
        var item = candidates[idx];
        fetch(item.src, { method: 'HEAD' })
          .then(function (r) {
            if (r.ok) {
              applyMedia(item);
            } else {
              tryNext(idx + 1);
            }
          })
          .catch(function () { tryNext(idx + 1); });
      }

      tryNext(0);
    })();
  </script>
</body>

</html>
